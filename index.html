<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能多功能衝刺站</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #131314; --card-bg: #1e1f20; --text: #e3e3e3; --primary: #a8c7fa; --border: #444746; --accent: #ff7675; --ring-bg: #2b2a2a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 1100px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* 登入 */
        #login-section { text-align: center; max-width: 400px; margin: 100px auto; }
        input { padding: 12px; background: #2b2a2a; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 10px; box-sizing: border-box; width: 100%; }
        input:focus { outline: none; border-color: var(--primary); }
        button { background: var(--primary); color: #131314; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.1); transform: scale(0.98); }
        button.secondary { background: var(--border); color: var(--text); }

        #main-app, #admin-dashboard { display: none; }
        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        @media(max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        /* 自訂倒數 */
        .countdown-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 15px; }
        .cd-item { background: #2b2a2a; padding: 15px; border-radius: 10px; border: 1px solid var(--border); position: relative; text-align: center; }
        .cd-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; font-size: 16px; }
        .cd-time { font-size: 18px; font-family: monospace; letter-spacing: 1px; }
        .del-btn { position: absolute; top: 8px; right: 10px; color: var(--accent); cursor: pointer; font-size: 12px; font-weight: bold; }

        /* 科技感圓環番茄鐘 */
        .timer-container { position: relative; width: 200px; height: 200px; margin: 20px auto; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: conic-gradient(var(--primary) 100%, var(--ring-bg) 0%); box-shadow: 0 0 20px rgba(168, 199, 250, 0.1); transition: background 1s linear; }
        .timer-inner { position: absolute; width: 180px; height: 180px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 2; }
        .timer-text { font-size: 42px; font-weight: bold; font-family: monospace; color: var(--text); }
        .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 0 0 rgba(168, 199, 250, 0.4); animation: pulsing 2s infinite; display: none; z-index: 1; }

        /* AI 區 */
        .chat-box { height: 400px; overflow-y: auto; padding: 15px; background: #131314; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        .msg { margin-bottom: 12px; padding: 12px 16px; border-radius: 10px; max-width: 85%; line-height: 1.5; word-break: break-all; }
        .user-msg { background: #2b2a2a; margin-left: auto; text-align: right; }
        .ai-msg { background: transparent; margin-right: auto; color: #e3e3e3; }
        .ai-msg strong, .ai-msg b { color: var(--primary); font-weight: bold; }
        .ai-msg pre { background: #2b2a2a; padding: 10px; border-radius: 6px; overflow-x: auto; }

        /* YT Music */
        .ytm-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 10px; margin-top: 15px; border: 1px solid var(--border); }
        .ytm-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        @keyframes pulsing { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(168, 199, 250, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(168, 199, 250, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(168, 199, 250, 0); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="login-section" class="card">
        <h2>登入</h2>
        <input type="text" id="username-input" placeholder="輸入名稱或管理員密碼...">
        <button onclick="handleLogin()" style="width:100%;">進入</button>
    </div>

    <div id="main-app">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <div style="font-size: 18px;">使用者：<span id="user-display" style="color:var(--primary); font-weight:bold;"></span></div>
            <button onclick="handleLogout()" class="secondary" style="padding: 8px 16px;">登出</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">⏱️ 倒數計時</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="cd-name" placeholder="名稱 (例如：會考、段考)" style="width: 200px; margin: 0;">
                <input type="datetime-local" id="cd-date" style="width: 200px; margin: 0;">
                <button onclick="addCountdown()">新增</button>
            </div>
            <div class="countdown-list" id="countdown-display-area"></div>
        </div>

        <div class="grid">
            <div>
                <div class="card" style="text-align: center;">
                    <h3 style="margin:0;">⏱️ 番茄鐘</h3>
                    <div class="timer-container" id="timer-ring">
                        <div class="pulse" id="pulse-bg"></div>
                        <div class="timer-inner">
                            <div class="timer-text" id="timer">25:00</div>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 10px;">
                        <button onclick="toggleTimer()" id="start-btn">開始</button>
                        <button onclick="resetTimer()" class="secondary">重置</button>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin:0;">🎵 音樂播放器</h3>
                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <input type="text" id="ytm-url" placeholder="貼上 YouTube 網址..." style="margin:0; flex:1;">
                        <button onclick="saveAndLoadYtm()">載入</button>
                    </div>
                    <div id="ytm-player-area"></div>
                </div>
            </div>

            <div class="card" style="display: flex; flex-direction: column;">
                <h3 style="margin-top:0;">AI 諮詢區</h3>
                
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="password" id="api-key-input" placeholder="請貼上你的 Gemini API Key..." style="margin:0; font-size:12px; flex:1;">
                    <button onclick="saveApiKey()" style="padding:0 10px; font-size:12px; background:var(--border); color:var(--text);">儲存 Key</button>
                </div>

                <div class="chat-box" id="chat-box"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="現在可以問任何問題了..." onkeypress="if(event.key==='Enter') sendChat()" style="margin:0; flex:1;">
                    <button onclick="sendChat()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="card">
        <h2 style="color:var(--primary); margin-top:0;">🛡️ 後台管理系統</h2>
        <table>
            <thead>
                <tr><th>使用者</th><th>狀態</th><th>番茄鐘完成次數</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td id="adm-curr-user">-</td>
                    <td style="color:#2ecc71;">● 線上</td>
                    <td id="adm-sessions">0</td>
                </tr>
            </tbody>
        </table>
        <button onclick="handleLogout()" class="secondary" style="margin-top: 15px;">退出後台</button>
    </div>
</div>

<script>
    let timerInterval, timeLeft = 25 * 60, totalTime = 25 * 60, isRunning = false, currentUser = "";
    let savedCountdowns = [];

    window.onload = function() {
        const savedUser = localStorage.getItem("study_username");
        if(savedUser) { loginSuccess(savedUser); }
        setInterval(updateAllCountdowns, 1000);
    }

    function handleLogin() {
        const user = document.getElementById("username-input").value.trim();
        if(!user) return;
        
        if(user === "aA01212012") {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("admin-dashboard").style.display = "block";
            document.getElementById("adm-curr-user").innerText = localStorage.getItem("study_username") || "無資料";
            document.getElementById("adm-sessions").innerText = localStorage.getItem("tomato_sessions") || "0";
            return;
        }
        localStorage.setItem("study_username", user);
        loginSuccess(user);
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById("login-section").style.display = "none";
        document.getElementById("main-app").style.display = "block";
        document.getElementById("user-display").innerText = user;
        
        // 載入 API Key
        const savedKey = localStorage.getItem(`gemini_key_${currentUser}`);
        if(savedKey) { document.getElementById("api-key-input").value = savedKey; }

        const savedYtm = localStorage.getItem(`ytm_embed_${currentUser}`);
        if(savedYtm) { document.getElementById("ytm-url").value = savedYtm; renderYtmEmbed(savedYtm); }
        savedCountdowns = JSON.parse(localStorage.getItem(`countdowns_${currentUser}`) || "[]");
        renderCountdowns();
        loadChatHistory();
    }

    function handleLogout() { localStorage.removeItem("study_username"); location.reload(); }

    function saveApiKey() {
        const key = document.getElementById("api-key-input").value.trim();
        localStorage.setItem(`gemini_key_${currentUser}`, key);
        alert("API Key 已儲存至本地瀏覽器！");
    }

    // YT Music
    function saveAndLoadYtm() {
        let url = document.getElementById("ytm-url").value.trim();
        if(!url) return;
        if(url.includes("youtu.be/")) { url = url.replace("youtu.be/", "www.youtube.com/embed/"); } 
        else if(url.includes("watch?v=")) {
            const urlObj = new URL(url);
            const vid = urlObj.searchParams.get("v");
            const list = urlObj.searchParams.get("list");
            url = list ? `https://www.youtube.com/embed/videoseries?list=${list}` : `https://www.youtube.com/embed/${vid}`;
        } else if(url.includes("playlist?list=")) {
            url = `https://www.youtube.com/embed/videoseries?list=${new URL(url).searchParams.get("list")}`;
        }
        localStorage.setItem(`ytm_embed_${currentUser}`, url);
        renderYtmEmbed(url);
    }
    function renderYtmEmbed(url) { document.getElementById("ytm-player-area").innerHTML = `<div class="ytm-container"><iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`; }

    // 倒數計時
    function addCountdown() {
        const name = document.getElementById("cd-name").value.trim();
        const dateStr = document.getElementById("cd-date").value;
        if(!name || !dateStr) return;
        savedCountdowns.push({ id: Date.now(), name: name, target: new Date(dateStr).getTime() });
        localStorage.setItem(`countdowns_${currentUser}`, JSON.stringify(savedCountdowns));
        document.getElementById("cd-name").value = ""; document.getElementById("cd-date").value = "";
        renderCountdowns();
    }
    function deleteCountdown(id) {
        savedCountdowns = savedCountdowns.filter(c => c.id !== id);
        localStorage.setItem(`countdowns_${currentUser}`, JSON.stringify(savedCountdowns));
        renderCountdowns();
    }
    function renderCountdowns() {
        document.getElementById("countdown-display-area").innerHTML = savedCountdowns.map(c => `
            <div class="cd-item">
                <span class="del-btn" onclick="deleteCountdown(${c.id})">✖</span>
                <div class="cd-title">${c.name}</div>
                <div class="cd-time" id="time-run-${c.id}">計算中...</div>
            </div>
        `).join('');
    }
    function updateAllCountdowns() {
        savedCountdowns.forEach(c => {
            const el = document.getElementById(`time-run-${c.id}`);
            if(!el) return;
            const diff = c.target - new Date().getTime();
            if(diff <= 0) { el.innerText = "已截止"; el.style.color = "var(--accent)"; return; }
            const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            el.innerText = `${d}天 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        });
    }

    // 番茄鐘
    function toggleTimer() {
        const ring = document.getElementById("timer-ring");
        const pulse = document.getElementById("pulse-bg");
        if(isRunning) { clearInterval(timerInterval); document.getElementById("start-btn").innerText = "繼續"; pulse.style.display = "none"; } 
        else {
            pulse.style.display = "block";
            timerInterval = setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--; updateTimerDisplay();
                    let percent = (timeLeft / totalTime) * 100;
                    ring.style.background = `conic-gradient(var(--primary) ${percent}%, var(--ring-bg) ${percent}%)`;
                } else {
                    clearInterval(timerInterval); alert("時間到！");
                    localStorage.setItem("tomato_sessions", parseInt(localStorage.getItem("tomato_sessions") || "0") + 1);
                    resetTimer();
                }
            }, 1000);
            document.getElementById("start-btn").innerText = "暫停";
        }
        isRunning = !isRunning;
    }
    function resetTimer() {
        clearInterval(timerInterval); timeLeft = totalTime; isRunning = false;
        document.getElementById("start-btn").innerText = "開始"; document.getElementById("pulse-bg").style.display = "none";
        document.getElementById("timer-ring").style.background = `conic-gradient(var(--primary) 100%, var(--ring-bg) 0%)`;
        updateTimerDisplay();
    }
    function updateTimerDisplay() { document.getElementById("timer").innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`; }

// 升級後的 AI 呼叫程式碼（會印出 Google 真實的錯誤訊息）
    async function sendChat() {
        const input = document.getElementById("chat-input");
        const text = input.value.trim();
        if(!text) return;

        const apiKey = localStorage.getItem(`gemini_key_${currentUser}`);
        if(!apiKey) {
            alert("請先在上方輸入你的 Gemini API Key！");
            return;
        }

        appendMessage(text, 'user-msg');
        input.value = "";

        const box = document.getElementById("chat-box");
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "msg ai-msg";
        loadingDiv.id = "gemini-loading";
        loadingDiv.innerText = "AI 正在思考中...";
        box.appendChild(loadingDiv);
        box.scrollTop = box.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            
            const data = await response.json();
            document.getElementById("gemini-loading").remove();

            // 如果有正常收到回答
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                const reply = data.candidates[0].content.parts[0].text;
                appendMessage(reply, 'ai-msg');
                saveChat(text, reply);
            } 
            // 如果遇到 Google 新版 AQ 金鑰的 Bug 或限制，直接把原因印在畫面上
            else if (data.error) {
                appendMessage(`❌ **Google API 拒絕連線！**\n原因：${data.error.message}\n*(錯誤代碼：${data.error.code})*`, 'ai-msg');
            } else {
                appendMessage("AI 回傳了未知的格式，請稍後再試。", 'ai-msg');
            }
        } catch (error) {
            if(document.getElementById("gemini-loading")) document.getElementById("gemini-loading").remove();
            appendMessage("連線失敗！請檢查網路狀態。", 'ai-msg');
        }
    }
