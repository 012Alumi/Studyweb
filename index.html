<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 風格段考衝刺站</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #131314; --card-bg: #1e1f20; --text: #e3e3e3; --primary: #a8c7fa; --border: #444746; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 1000px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* 登入區 */
        #login-section { text-align: center; max-width: 400px; margin: 100px auto; }
        input { padding: 12px; width: 80%; background: #2b2a2a; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; margin-bottom: 15px; }
        button { background: var(--primary); color: #131314; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        /* 主配置 */
        #main-app, #admin-dashboard { display: none; }
        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        @media(max-width: 800px) { .grid { grid-template-columns: 1fr; } }
        
        /* 倒數 */
        .countdown { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .tile { background: #2b2a2a; padding: 10px; border-radius: 8px; min-width: 60px; text-align: center; }
        .tile-num { font-size: 24px; font-weight: bold; color: var(--primary); }

        /* 字卡 */
        .flashcard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .flashcard { background: #28292a; padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; cursor: pointer; font-weight: bold; color: var(--primary); }

        /* AI 聊天室 */
        .chat-box { height: 300px; overflow-y: auto; padding: 10px; background: #1e1f20; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; max-width: 85%; }
        .user-msg { background: #2b2a2a; margin-left: auto; text-align: right; }
        .ai-msg { background: transparent; margin-right: auto; }
        .ai-msg strong { color: var(--primary); }

        /* 表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="login-section" class="card">
        <h2>🔑 登入衝刺站</h2>
        <input type="text" id="username-input" placeholder="輸入名字或管理員密碼...">
        <button onclick="handleLogin()">登入</button>
    </div>

    <div id="main-app">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <div>歡迎，<span id="user-display" style="color:var(--primary)"></span></div>
            <button onclick="handleLogout()" style="background:#444746; color:white; padding:6px 12px; font-size:14px;">登出</button>
        </div>

        <div class="card">
            <h3 style="margin:0; text-align:center;">⏱️ 距離段考倒數</h3>
            <div class="countdown">
                <div class="tile"><div class="tile-num" id="cd-d">00</div><div>天</div></div>
                <div class="tile"><div class="tile-num" id="cd-h">00</div><div>時</div></div>
                <div class="tile"><div class="tile-num" id="cd-m">00</div><div>分</div></div>
                <div class="tile"><div class="tile-num" id="cd-s">00</div><div>秒</div></div>
            </div>
        </div>

        <div class="grid">
            <div>
                <div class="card">
                    <h3>🎵 我的 YouTube Music</h3>
                    <input type="text" id="ytm-url" placeholder="貼上你的 YT Music 歌單網址..." style="width:90%;">
                    <button onclick="saveYtmUrl()" style="padding:8px 16px; font-size:14px; background:#444746; color:white;">儲存歌單</button>
                    <button onclick="openYtm()" style="padding:8px 16px; font-size:14px; margin-left:5px;">打開音樂</button>
                </div>

                <div class="card" style="text-align: center;">
                    <h3 style="margin:0;">⏱️ 番茄鐘</h3>
                    <div id="timer" style="font-size: 42px; font-weight: bold; margin: 10px 0;">25:00</div>
                    <button onclick="toggleTimer()" id="start-btn">開始</button>
                    <button onclick="resetTimer()" style="background:#444746; color:white; margin-left:5px;">重置</button>
                </div>

                <div class="card">
                    <h3>📋 考前核心急救卡</h3>
                    <div class="flashcard-grid">
                        <div class="flashcard" onclick="this.innerText=this.innerText.includes('公式')?'質量 ÷ 分子量':'理化：莫耳數公式'">理化：莫耳數公式</div>
                        <div class="flashcard" onclick="this.innerText=this.innerText.includes('定理')?'外角和皆為 360°':'數學：外角和定理'">數學：外角和定理</div>
                    </div>
                </div>
            </div>

            <div class="card" style="display: flex; flex-direction: column;">
                <h3>🤖 Gemini 風格學伴</h3>
                <div class="chat-box" id="chat-box"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="問點什麼..." onkeypress="if(event.key==='Enter') sendChat()" style="margin:0;">
                    <button onclick="sendChat()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="card">
        <h2 style="color:var(--primary);">🛡️ 最高權限管理後台</h2>
        <table>
            <thead>
                <tr><th>使用者</th><th>狀態</th><th>番茄鐘次數</th><th>對話筆數</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td id="adm-curr-user"></td>
                    <td style="color:#2ecc71;">● 線上</td>
                    <td id="adm-sessions">0</td>
                    <td id="adm-chats">0</td>
                </tr>
            </tbody>
        </table>
        <button onclick="handleLogout()" style="background:#444746; color:white;">退出</button>
    </div>
</div>

<script>
    let timerInterval, countdownInterval, timeLeft = 25 * 60, isRunning = false, currentUser = "";
    const examDate = new Date(); examDate.setDate(examDate.getDate() + 4); // 預設4天後段考

    window.onload = function() {
        const savedUser = localStorage.getItem("study_username");
        if(savedUser) { loginSuccess(savedUser); }
        startCountdown();
    }

    function handleLogin() {
        const user = document.getElementById("username-input").value.trim();
        if(!user) return;
        if(user === "admin123") {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("admin-dashboard").style.display = "block";
            document.getElementById("adm-curr-user").innerText = localStorage.getItem("study_username") || "無";
            document.getElementById("adm-sessions").innerText = localStorage.getItem("tomato_sessions") || "0";
            document.getElementById("adm-chats").innerText = JSON.parse(localStorage.getItem(`chat_history_${localStorage.getItem("study_username")}`)|| "[]").length;
            return;
        }
        localStorage.setItem("study_username", user);
        loginSuccess(user);
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById("login-section").style.display = "none";
        document.getElementById("main-app").style.display = "block";
        document.getElementById("user-display").innerText = user;
        const savedUrl = localStorage.getItem(`ytm_url_${currentUser}`);
        if(savedUrl) { document.getElementById("ytm-url").value = savedUrl; }
        loadChatHistory();
    }

    function handleLogout() { localStorage.removeItem("study_username"); location.reload(); }

    function saveYtmUrl() {
        const url = document.getElementById("ytm-url").value.trim();
        localStorage.setItem(`ytm_url_${currentUser}`, url);
        alert("歌單網址已儲存！");
    }

    function openYtm() {
        const url = document.getElementById("ytm-url").value.trim() || "https://music.youtube.com/";
        window.open(url, '_blank');
    }

    function startCountdown() {
        function updateCd() {
            const diff = examDate.getTime() - new Date().getTime();
            if(diff <= 0) return;
            document.getElementById("cd-d").innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
            document.getElementById("cd-h").innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById("cd-m").innerText = Math.floor((diff % 3600000) / 600000).toString().padStart(2, '0');
            document.getElementById("cd-s").innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        }
        updateCd(); setInterval(updateCd, 1000);
    }

    function toggleTimer() {
        if(isRunning) { clearInterval(timerInterval); document.getElementById("start-btn").innerText = "繼續"; } 
        else {
            timerInterval = setInterval(() => {
                if(timeLeft > 0) { timeLeft--; updateTimerDisplay(); } 
                else {
                    clearInterval(timerInterval); alert("番茄鐘結束！");
                    localStorage.setItem("tomato_sessions", parseInt(localStorage.getItem("tomato_sessions") || "0") + 1);
                    resetTimer();
                }
            }, 1000);
            document.getElementById("start-btn").innerText = "暫停";
        }
        isRunning = !isRunning;
    }
    function resetTimer() { clearInterval(timerInterval); timeLeft = 25 * 60; isRunning = false; document.getElementById("start-btn").innerText = "開始"; updateTimerDisplay(); }
    function updateTimerDisplay() { document.getElementById("timer").innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`; }

    function sendChat() {
        const input = document.getElementById("chat-input"); const text = input.value.trim(); if(!text) return;
        appendMessage(text, 'user-msg'); input.value = "";
        setTimeout(() => {
            let reply = text.includes("出題") ? "**題目：** 凸五邊形的內角和是多少度？\n\n*(提示：公式為 $(n-2) \\times 180$ )*" : `加油 **${currentUser}**，專注當下，段考沒問題的！`;
            appendMessage(reply, 'ai-msg'); saveChat(text, reply);
        }, 500);
    }
    function appendMessage(text, className) {
        const box = document.getElementById("chat-box"); const div = document.createElement("div");
        div.className = `msg ${className}`; div.innerHTML = className === 'ai-msg' ? marked.parse(text) : text;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }
    function saveChat(u, a) { let h = JSON.parse(localStorage.getItem(`chat_history_${currentUser}`) || "[]"); h.push({user: u, ai: a}); localStorage.setItem(`chat_history_${currentUser}`, JSON.stringify(h)); }
    function loadChatHistory() { const box = document.getElementById("chat-box"); box.innerHTML = ""; let h = JSON.parse(localStorage.getItem(`chat_history_${currentUser}`) || "[]"); h.forEach(item => { appendMessage(item.user, 'user-msg'); appendMessage(item.ai, 'ai-msg'); }); }
</script>
</body>
</html>
