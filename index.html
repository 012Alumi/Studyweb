<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的段考衝刺站</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #4A90E2; }
        .note-box { text-align: left; background: #fff9db; padding: 15px; border-left: 5px solid #fab005; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 段考衝刺倒數站</h1>
        <p>距離段考只剩最後幾天，穩住就贏了！</p>
        
        <hr>
        
        <div class="note-box">
            <h3>💡 數學/理化核心重點記一下</h3>
            <ul>
                <li>❌ 莫耳數 (mol) = 質量 (g) / 分子量</li>
                <li>❌ 外角和公式：任何凸多邊形的外角和都是 360°</li>
            </ul>
        </div>

        <div class="note-box">
            <h3>🇬🇧 英文常錯單字</h3>
            <ul>
                <li>prepare (v.) 準備 (段考前必背！)</li>
                <li>concentrate (v.) 專心</li>
            </ul>
        </div>
    </div>
</body>
</html>
